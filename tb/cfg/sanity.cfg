# =============================================================================
# sanity.cfg — P0 sanity test configuration
#
# Used with: +UVM_TESTNAME=deu_sanity_test  (cfg already embedded in test)
# Or:        +UVM_TESTNAME=deu_base_test +cfg=cfg/sanity.cfg
#
# Purpose: README standard example, quick smoke-check after RTL edits.
# =============================================================================

test_mode              = DIRECTED
num_transactions       = 1
sliv_fixed             = 114       # S=2, L=8 → bitmap=0x3366, 8 valid channels
vld_pattern            = ALWAYS_HIGH
check_pipeline_delay   = 1
check_power_hold       = 0
max_cycles             = 500
